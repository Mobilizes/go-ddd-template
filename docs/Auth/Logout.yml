info:
  name: Logout
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/api/logout"
  body:
    type: json
    data: ""
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getBody() && res.body.data && res.body.data.access_token) {
          bru.setVar("TOKEN", res.body.data.access_token)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
