info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/login"
  body:
    type: json
    data: |-
      {
        "email": "user@test.com",
        "password": "password"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getBody() && res.body.data && res.body.data.access_token) {
          bru.setVar("TOKEN", res.body.data.access_token)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
