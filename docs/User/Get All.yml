info:
  name: Get All
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/api/user/?page=0&limit=10"
  params:
    - name: page
      value: "0"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: sort
      value: asc
      type: query
      disabled: true
    - name: sortBy
      value: id
      type: query
      disabled: true
    - name: filter
      value: asd
      type: query
      disabled: true
    - name: filterBy
      value: name
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
